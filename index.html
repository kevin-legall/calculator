<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculatrice</title>

  <link rel="stylesheet" href="./style.css">
</head>

<body>

    <h3 id="result"></h3>
    <button class="btn function"id="clear">C</button>
    <button class="btn function"id="plusminus">+/-</button>
    <button class="btn function"id="prct">%</button>
    <button class="btn calc" id="div">÷</button>
    <button class="btn number" id="7">7</button>
    <button class="btn number" id="8">8</button>
    <button class="btn number" id="9">9</button>
    <button class="btn calc" id="times">x</button>
    <button class="btn number" id="4">4</button>
    <button class="btn number" id="5">5</button>
    <button class="btn number" id="6">6</button>
    <button class="btn calc" id="minus">-</button>
    <button class="btn number" id="1">1</button>
    <button class="btn number" id="2">2</button>
    <button class="btn number" id="3">3</button>
    <button class="btn calc" id="plus">+</button>
    <button class="btn zero" id="zero">0</button>
    <button class="btn number" id=".">,</button>
    <button class="btn calc"id="equal">=</button>

  <script src="index.js"></script>
</body>

</html>
